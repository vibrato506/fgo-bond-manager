# ゲーム効率計算 設定ファイル

quests:
  90p:
    title: "リザルト: 90+"
    base_drop: 3
    boxes:
      gold: 9.0
      silver: 9.5
      copper: 9.5
  90pp:
    title: "リザルト: 90++"
    base_drop: 3
    boxes:
      gold: 11.6
      silver: 11.5
      copper: 11.2

# ---------------------------------------------------------
# 素材設定 (Material Settings)
# ---------------------------------------------------------
materials:
  gold:
    name: "金素材"
    owned: 0
    needed: 3500
    bonus_normal: 1
    bonus_evolved: 2
  silver:
    name: "銀素材"
    owned: 0
    needed: 3500
    bonus_normal: 1
    bonus_evolved: 2
  copper:
    name: "銅素材"
    owned: 0
    needed: 3900
    bonus_normal: 1
    bonus_evolved: 2

# ---------------------------------------------------------
# 前提条件 (Preconditions)
# ---------------------------------------------------------
preconditions:
  # 自由枠として使いたい数
  reserved_slots: 0

  # 必ず装備するイベント礼装
  must_equip:
    point: 0

  # 絆礼装のおおよその編成可能数
  max_bond_equips: 5

# ---------------------------------------------------------
# 装備・編成設定 (Loadout Settings)
# ---------------------------------------------------------
# 合計所持数 (Inventory)
loadout:
  self:
    gold:   {normal: 1, evolved: 0} # 星5礼装
    silver: {normal: 2, evolved: 0} # 星4礼装
    copper: {normal: 3, evolved: 1} # 星3礼装

  friend:
    type: "auto"   # auto, gold, silver, copper, none
    evolved: true

# ---------------------------------------------------------
# 出力設定 (Output Settings)
# ---------------------------------------------------------
output:
  group_by_stage: false

# ---------------------------------------------------------
# ステージ設定 (Stage Settings)
# ---------------------------------------------------------
stage:
  base_drop: 3       # 1枠あたりの基礎ドロップ数（クエスト情報が分かり次第入力）
