# ゲーム効率計算 設定ファイル

# ---------------------------------------------------------
# 素材設定 (Material Settings)
# ---------------------------------------------------------
materials:
  gold:
    name: "金素材"
    owned: 1738       # 所持数
    needed: 3350     # 必要数
    bonus_normal: 1  # 未進化装備のボーナス (+1)
    bonus_evolved: 2 # 進化済み装備のボーナス (+2)
  silver:
    name: "銀素材"
    owned: 1456
    needed: 3050
    bonus_normal: 1
    bonus_evolved: 2
  copper:
    name: "銅素材"
    owned: 1438
    needed: 3500
    bonus_normal: 1
    bonus_evolved: 2

# ---------------------------------------------------------
# ポイント設定 (Point Settings)
# ---------------------------------------------------------
points:
  current: 1063760     # 現在のポイント
  target: 3000000      # 目標ポイント (300万)
  evolution_target: 1400000
  base_point: 13420    # 1周あたりの基礎ポイント
  bonus_normal: 0.3    # 未進化装備のボーナス (30%)
  bonus_evolved: 0.6   # 進化済み装備のボーナス (60%)

# ---------------------------------------------------------
# 前提条件 (Preconditions)
# ---------------------------------------------------------
preconditions:
  # 自由枠として使いたい数（NPチャージ礼装や黒聖杯などのために空けておく枠数）
  reserved_slots: 0

  # 必ず装備するイベント礼装 (Must Equip)
  # 指定した数の礼装を、最優先で（進化 > 未進化の順に）確保します
  must_equip:
    point: 1  # ポイント礼装を必ず1枚装備

  # 絆礼装のおおよその編成可能数 (Max Bond CEs)
  # コスト調整などで、これ以上は絆礼装を積めないという上限
  max_bond_equips: 3

# ---------------------------------------------------------
# 装備・編成設定 (Loadout Settings)
# ---------------------------------------------------------
# 合計所持数 (Inventory)
loadout:
  # 自前所持数 (Inventory) - ここに所持している全ての礼装数を入力してください
  # スクリプトが自動的に最適な5枚を選んで計算します
  self:
    gold:   {normal: 2, evolved: 0}
    silver: {normal: 0, evolved: 0}
    copper: {normal: 1, evolved: 1} # 例: 銅進化x1
    point:  {normal: 6, evolved: 0} # 例: ポイント未進化x5
    # 合計数は5を超えても構いません（自動的にベストな5枚が選ばれます）

  # フレンド編成 (1枠)
  friend:
    type: "gold"   # 装備タイプ: gold, silver, copper, point, none
    evolved: true  # true=進化済み, false=未進化

# ---------------------------------------------------------
# 出力設定 (Output Settings)
# ---------------------------------------------------------
output:
  # ステージごとに結果をまとめるか (True: まとめる, False: 詳細に分ける)
  # Trueにすると、同じクエストでの装備微調整による分割がなくなり、1つのステップに集約されます
  group_by_stage: false

# ---------------------------------------------------------
# ステージ設定 (Stage Settings)
# ---------------------------------------------------------
stage:
  base_runs: 11      # 基礎枠数
  base_drop: 3       # 1枠あたりの基礎ドロップ数
